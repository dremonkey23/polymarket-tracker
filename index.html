<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLYSIGHTS | Live Insider Trading Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 100%);
            color: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0 40px;
            border-bottom: 2px solid #2d3748;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .header p {
            font-size: 1.2rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .live-badge {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .last-updated {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(26, 31, 46, 0.8);
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #06b6d4;
        }

        .section {
            background: rgba(26, 31, 46, 0.6);
            border: 1px solid #2d3748;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .spinner {
            border: 2px solid #2d3748;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .leaderboard {
            display: grid;
            gap: 15px;
        }

        .trader-card {
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .trader-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        .trader-info h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .trader-info p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .trader-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .score {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .pnl {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .positive { color: #10b981; }
        .negative { color: #ef4444; }

        .opportunities-grid {
            display: grid;
            gap: 20px;
        }

        .opportunity-card {
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .opportunity-card:hover {
            border-color: #06b6d4;
            transform: translateY(-2px);
        }

        .market-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .opportunity-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .appeal-meter {
            height: 8px;
            background: #374151;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
        }

        .appeal-fill {
            height: 100%;
            background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            color: #fecaca;
            text-align: center;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .container {
                padding: 15px;
            }
            
            .trader-card, .opportunity-card {
                padding: 15px;
            }
            
            .trader-stats {
                flex-direction: column;
                gap: 10px;
                align-items: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="live-badge">🔴 LIVE DATA</span>
            <h1>POLYSIGHTS</h1>
            <p>Real-Time Insider Trading Intelligence</p>
            <div class="last-updated" id="lastUpdated">Loading...</div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h3>Total Traders</h3>
                <div class="value" id="totalTraders">-</div>
            </div>
            <div class="stat-card">
                <h3>Total P&L</h3>
                <div class="value" id="totalPnL">-</div>
            </div>
            <div class="stat-card">
                <h3>Avg Score</h3>
                <div class="value" id="avgScore">-</div>
            </div>
            <div class="stat-card">
                <h3>Live Opportunities</h3>
                <div class="value" id="activeOpportunities">-</div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">🏆 Top Performers</h2>
            <div id="performersContent">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading live trader data...
                </div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">🎯 Live Copy Trading Opportunities</h2>
            <div id="opportunitiesContent">
                <div class="loading">
                    <div class="spinner"></div>
                    Scanning for profitable positions...
                </div>
            </div>
        </div>
    </div>

    <script>
        let refreshInterval;

        // Format currency
        function formatCurrency(amount) {
            const abs = Math.abs(amount);
            if (abs >= 1000000) {
                return (amount / 1000000).toFixed(1) + 'M';
            } else if (abs >= 1000) {
                return (amount / 1000).toFixed(1) + 'K';
            }
            return amount.toFixed(0);
        }

        // Format price as cents
        function formatPrice(price) {
            return Math.round(price * 100) + '¢';
        }

        // Fetch and display stats
        async function loadStats() {
            try {
                const response = await fetch('/.netlify/functions/api/stats');
                const stats = await response.json();
                
                document.getElementById('totalTraders').textContent = stats.totalTraders;
                document.getElementById('totalPnL').textContent = '$' + formatCurrency(stats.totalPnL);
                document.getElementById('avgScore').textContent = stats.avgScore;
                document.getElementById('activeOpportunities').textContent = stats.activeOpportunities;
                document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date(stats.lastUpdated).toLocaleTimeString();
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        // Fetch and display top performers
        async function loadPerformers() {
            try {
                const response = await fetch('/.netlify/functions/api/performers');
                const performers = await response.json();
                
                const content = document.getElementById('performersContent');
                
                if (performers.length === 0) {
                    content.innerHTML = '<div class="loading">No trader data available</div>';
                    return;
                }

                const html = performers.map(trader => `
                    <div class="trader-card">
                        <div class="trader-info">
                            <h4>${trader.pseudonym}</h4>
                            <p>${trader.total_trades} trades • ${trader.markets_count} markets</p>
                        </div>
                        <div class="trader-stats">
                            <div class="score">${trader.score}</div>
                            <div class="pnl ${trader.total_pnl >= 0 ? 'positive' : 'negative'}">
                                ${trader.total_pnl >= 0 ? '+' : ''}$${formatCurrency(trader.total_pnl)}
                            </div>
                        </div>
                    </div>
                `).join('');

                content.innerHTML = html;
            } catch (error) {
                console.error('Failed to load performers:', error);
                document.getElementById('performersContent').innerHTML = `
                    <div class="error">
                        Failed to load trader data. 
                        <button class="refresh-btn" onclick="loadPerformers()">Retry</button>
                    </div>
                `;
            }
        }

        // Fetch and display opportunities
        async function loadOpportunities() {
            try {
                const response = await fetch('/.netlify/functions/api/opportunities');
                const opportunities = await response.json();
                
                const content = document.getElementById('opportunitiesContent');
                
                if (opportunities.length === 0) {
                    content.innerHTML = '<div class="loading">No profitable opportunities found</div>';
                    return;
                }

                const html = opportunities.map(opp => `
                    <div class="opportunity-card">
                        <div class="market-title">${opp.market}</div>
                        <div class="opportunity-details">
                            <div class="detail-item">
                                <div class="detail-label">Trader</div>
                                <div class="detail-value">${opp.trader}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Outcome</div>
                                <div class="detail-value">${opp.outcome}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Current Price</div>
                                <div class="detail-value">${formatPrice(opp.current_price)}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">P&L</div>
                                <div class="detail-value ${opp.pnl >= 0 ? 'positive' : 'negative'}">
                                    ${opp.pnl >= 0 ? '+' : ''}$${formatCurrency(opp.pnl)}
                                </div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Risk</div>
                                <div class="detail-value">${opp.risk.charAt(0).toUpperCase() + opp.risk.slice(1)}</div>
                            </div>
                        </div>
                        <div class="appeal-meter">
                            <div class="appeal-fill" style="width: ${opp.copy_appeal}%"></div>
                        </div>
                        <div style="text-align: center; margin-top: 8px; font-size: 0.9rem; color: #94a3b8;">
                            Copy Appeal: ${opp.copy_appeal}%
                        </div>
                    </div>
                `).join('');

                content.innerHTML = html;
            } catch (error) {
                console.error('Failed to load opportunities:', error);
                document.getElementById('opportunitiesContent').innerHTML = `
                    <div class="error">
                        Failed to load opportunities. 
                        <button class="refresh-btn" onclick="loadOpportunities()">Retry</button>
                    </div>
                `;
            }
        }

        // Load all data
        async function loadAllData() {
            await Promise.all([
                loadStats(),
                loadPerformers(),
                loadOpportunities()
            ]);
        }

        // Auto-refresh every 10 minutes
        function startAutoRefresh() {
            refreshInterval = setInterval(loadAllData, 10 * 60 * 1000); // 10 minutes
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadAllData();
            startAutoRefresh();
        });
    </script>
</body>
</html>
